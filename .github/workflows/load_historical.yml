name: GSE Load Historical CSV

on:
  workflow_dispatch:
    # Trigger this manually after uploading new monthly CSVs to S3.
    # It will:
    #   1. Run combine_historical.py  → updates complete_data.csv in S3
    #   2. Run load_to_postgres.py    → upserts everything into Supabase

jobs:
  load:
    name: Combine CSVs & Load to Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Combine historical CSVs (S3 → S3)
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME:        ${{ secrets.S3_BUCKET_NAME }}
          S3_CSV_PREFIX:         ${{ secrets.S3_CSV_PREFIX }}
        run: python combine_historical.py

      - name: Load complete_data.csv into Supabase
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME:        ${{ secrets.S3_BUCKET_NAME }}
          S3_CSV_PREFIX:         ${{ secrets.S3_CSV_PREFIX }}
        run: python load_to_postgres.py
